<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--white:#fff;--border:#dbdbdb;--text:#262626;--muted:#8e8e8e;
  --accent:#0095f6;--accent-dark:#0074cc;--danger:#ed4956;
  --nav-h:44px;--bottom-h:49px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── AUTH ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.auth-wrap{width:100%;max-width:350px}
.auth-box{background:var(--white);border:1px solid var(--border);padding:40px 40px 24px;margin-bottom:10px}
.auth-logo{text-align:center;margin-bottom:28px;font-size:2rem;font-weight:700;letter-spacing:-1px}
.auth-sep{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:.8rem;font-weight:600;letter-spacing:.05em}
.auth-sep::before,.auth-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-input{width:100%;background:#fafafa;border:1px solid var(--border);border-radius:3px;padding:9px 8px;font-size:.875rem;font-family:inherit;outline:none;margin-bottom:6px;transition:border-color .2s}
.auth-input:focus{border-color:#a8a8a8;background:#fff}
.auth-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:.875rem;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
.auth-btn:hover{opacity:.85}
.auth-switch{background:var(--white);border:1px solid var(--border);padding:16px;text-align:center;font-size:.875rem}
.auth-switch a{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none}
.auth-error{color:var(--danger);font-size:.8rem;text-align:center;margin-top:8px}

/* ── LAYOUT ── */
#app{display:none}
.app-layout{display:flex;justify-content:center;max-width:975px;margin:0 auto;padding-top:54px}
.feed-col{width:470px;padding:24px 0}
.right-col{width:293px;padding:24px 0 24px 28px;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;background:var(--white);border-bottom:1px solid var(--border);z-index:100;height:var(--nav-h)}
.topbar-inner{max-width:975px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.topbar-logo{font-size:1.4rem;font-weight:700;letter-spacing:-0.5px;cursor:pointer}
.topbar-search{flex:1;max-width:268px;margin:0 32px}
.topbar-search input{width:100%;background:#efefef;border:none;border-radius:8px;padding:7px 12px;font-size:.875rem;font-family:inherit;outline:none;color:var(--text)}
.topbar-icons{display:flex;align-items:center;gap:22px}
.topbar-icon{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;color:var(--text)}
.topbar-icon svg{width:24px;height:24px}

/* ── STORIES ── */
.stories-row{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:16px 16px 12px;margin-bottom:24px;display:flex;gap:14px;overflow-x:auto;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);display:flex;align-items:center;justify-content:center}
.story-ring.add-btn{background:none;border:2px solid var(--border)}
.story-avatar{width:56px;height:56px;border-radius:50%;border:2px solid white;object-fit:cover;background:#efefef}
.story-name{font-size:.72rem;color:var(--text);max-width:64px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── POST CARD ── */
.post-card{background:var(--white);border:1px solid var(--border);border-radius:3px;margin-bottom:24px}
.post-header{display:flex;align-items:center;padding:14px 16px;gap:12px}
.post-header .avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;background:#efefef;cursor:pointer}
.post-username{font-weight:600;font-size:.875rem;cursor:pointer;flex:1}
.post-username:hover{text-decoration:underline}
.post-music-badge{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--muted);background:#f5f5f5;border-radius:12px;padding:3px 10px;margin-right:4px}
.post-music-badge svg{width:13px;height:13px}
.post-more{background:none;border:none;cursor:pointer;color:var(--text);font-size:1.2rem;line-height:1;padding:4px}
.post-image{width:100%;display:block;max-height:600px;object-fit:cover;background:#efefef}
.post-actions{display:flex;align-items:center;padding:6px 8px 0}
.post-action-btn{background:none;border:none;cursor:pointer;padding:8px;display:flex;align-items:center;color:var(--text)}
.post-action-btn svg{width:24px;height:24px;transition:transform .1s}
.post-action-btn:active svg{transform:scale(.85)}
.post-save{margin-left:auto}
.post-likes{padding:0 16px;font-size:.875rem;font-weight:600;margin:4px 0 2px}
.post-caption{padding:0 16px;font-size:.875rem;line-height:1.5;margin-bottom:4px}
.post-caption .username{font-weight:600;cursor:pointer;margin-right:4px}
.post-caption .username:hover{text-decoration:underline}
.post-view-comments{padding:0 16px;font-size:.875rem;color:var(--muted);cursor:pointer;margin-bottom:4px}
.post-time{padding:0 16px;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;margin-bottom:12px}
.post-comment-row{border-top:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:12px}
.post-comment-row input{flex:1;border:none;outline:none;font-family:inherit;font-size:.875rem;background:transparent;color:var(--text)}
.post-comment-row input::placeholder{color:var(--muted)}
.post-comment-post{background:none;border:none;color:var(--accent);font-weight:600;font-size:.875rem;cursor:pointer;opacity:.5}
.post-comment-post.active{opacity:1}

/* ── COMMENTS MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.comments-modal{background:var(--white);width:min(900px,95vw);height:min(600px,90vh);display:flex;border-radius:4px;overflow:hidden}
.comments-post-preview{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
.comments-post-preview img{width:100%;height:100%;object-fit:contain}
.comments-post-preview .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#fafafa;font-size:.9rem;color:var(--text);padding:24px;text-align:center}
.comments-panel{width:335px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border)}
.comments-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.comments-list{flex:1;overflow-y:auto;padding:12px 16px}
.comment-item{display:flex;gap:12px;margin-bottom:16px}
.comment-item .avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;background:#efefef;flex-shrink:0}
.comment-body{flex:1}
.comment-body .username{font-weight:600;font-size:.875rem;cursor:pointer;margin-right:6px}
.comment-body .username:hover{text-decoration:underline}
.comment-body .text{font-size:.875rem;line-height:1.5}
.comment-body .time{font-size:.72rem;color:var(--muted);margin-top:2px}
.comments-input-row{border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.comments-input-row input{flex:1;border:none;outline:none;font-family:inherit;font-size:.875rem;color:var(--text)}
.comments-input-row input::placeholder{color:var(--muted)}
.comments-post-btn{background:none;border:none;color:var(--accent);font-weight:600;font-size:.875rem;cursor:pointer;opacity:.5}
.comments-post-btn.active{opacity:1}
.audio-player-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);padding:8px 12px;display:flex;align-items:center;gap:8px}
.audio-player-bar audio{flex:1;height:32px}

/* ── RIGHT PANEL ── */
.right-profile{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.right-profile .avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;cursor:pointer;background:#efefef}
.right-profile .info .name{font-weight:600;font-size:.875rem;cursor:pointer}
.right-profile .info .name:hover{text-decoration:underline}
.right-profile .info .fullname{font-size:.875rem;color:var(--muted)}
.right-profile .switch-btn{margin-left:auto;background:none;border:none;color:var(--accent);font-weight:600;font-size:.8rem;cursor:pointer}
.suggestions-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.suggestions-title span{font-size:.875rem;font-weight:600;color:var(--muted)}
.suggest-item{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.suggest-item .avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;cursor:pointer;background:#efefef;flex-shrink:0}
.suggest-item .info{flex:1;min-width:0}
.suggest-item .info .name{font-size:.875rem;font-weight:600;cursor:pointer;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.suggest-item .info .name:hover{text-decoration:underline}
.suggest-item .info .sub{font-size:.75rem;color:var(--muted)}
.suggest-follow{background:none;border:none;color:var(--accent);font-weight:600;font-size:.8rem;cursor:pointer;flex-shrink:0}

/* ── PROFILE PAGE ── */
.profile-page{max-width:935px;margin:0 auto;padding:30px 20px 0}
.profile-top{display:flex;align-items:flex-start;gap:80px;margin-bottom:44px;padding-bottom:44px;border-bottom:1px solid var(--border)}
.profile-avatar-wrap{width:150px;height:150px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#efefef;position:relative;cursor:pointer}
.profile-avatar-wrap img{width:100%;height:100%;object-fit:cover}
.profile-avatar-wrap .overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;opacity:0;transition:opacity .2s}
.profile-avatar-wrap:hover .overlay{opacity:1}
.profile-info-col{flex:1}
.profile-username-row{display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.profile-username{font-size:1.25rem;font-weight:300}
.profile-action-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 16px;font-size:.875rem;font-weight:600;cursor:pointer;transition:background .15s}
.profile-action-btn:hover{background:#efefef}
.profile-action-btn.following{background:var(--accent);color:#fff;border-color:var(--accent)}
.profile-action-btn.following:hover{background:var(--accent-dark)}
.profile-stats{display:flex;gap:40px;margin-bottom:20px}
.profile-bio{font-size:.875rem;line-height:1.5}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.profile-grid-item{aspect-ratio:1;overflow:hidden;cursor:pointer;background:#efefef;position:relative}
.profile-grid-item img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .15s}
.profile-grid-item:hover img{opacity:.85}
.profile-grid-item .music-icon{position:absolute;top:8px;right:8px;color:#fff;filter:drop-shadow(0 0 2px rgba(0,0,0,.6))}
.profile-grid-item .music-icon svg{width:18px;height:18px}

/* ── CREATE POST MODAL ── */
.create-modal{background:var(--white);border-radius:12px;width:min(520px,95vw);max-height:90vh;overflow-y:auto}
.create-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)}
.create-modal-header h3{font-size:1rem;font-weight:600;flex:1;text-align:center}
.create-form{padding:16px}
.create-form textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:12px;font-family:inherit;font-size:.9rem;resize:vertical;min-height:90px;outline:none;color:var(--text);transition:border-color .2s}
.create-form textarea:focus{border-color:#a8a8a8}
.upload-row{display:flex;gap:10px;margin-top:12px}
.upload-btn{flex:1;border:1px dashed var(--border);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;font-size:.8rem;color:var(--muted);transition:border-color .2s,color .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.upload-btn:hover{border-color:var(--accent);color:var(--accent)}
.upload-btn svg{width:22px;height:22px}
.upload-btn input[type=file]{display:none}
.preview-box{margin-top:12px;border-radius:8px;overflow:hidden;position:relative;background:#efefef}
.preview-box img{width:100%;max-height:280px;object-fit:cover;display:block}
.preview-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.audio-preview{margin-top:10px;display:flex;align-items:center;gap:10px;background:#f5f5f5;border-radius:8px;padding:8px 12px}
.audio-preview svg{width:18px;height:18px;color:var(--accent);flex-shrink:0}
.audio-preview .name{flex:1;font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.audio-preview button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem}

/* ── EXPLORE ── */
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.explore-item{aspect-ratio:1;overflow:hidden;cursor:pointer;background:#efefef;position:relative}
.explore-item img{width:100%;height:100%;object-fit:cover;transition:opacity .15s}
.explore-item:hover img{opacity:.85}
.explore-item .music-icon{position:absolute;top:8px;right:8px;color:#fff;filter:drop-shadow(0 0 2px rgba(0,0,0,.6))}
.explore-item .music-icon svg{width:18px;height:18px}
.explore-text-item{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:16px;cursor:pointer;aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end}
.explore-text-item .e-username{font-weight:600;font-size:.8rem;margin-bottom:4px}
.explore-text-item .e-content{font-size:.875rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}

/* ── SEARCH RESULTS ── */
.search-result-item{display:flex;align-items:center;gap:12px;padding:8px 0;cursor:pointer;border-bottom:1px solid var(--bg)}
.search-result-item:hover{background:#fafafa}
.search-result-item .avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:#efefef;flex-shrink:0}
.search-result-item .info .name{font-weight:600;font-size:.875rem}
.search-result-item .info .bio{font-size:.8rem;color:var(--muted)}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);height:var(--bottom-h);z-index:100;align-items:center;justify-content:space-around;padding:0 12px}
.bottom-nav-btn{background:none;border:none;cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.bottom-nav-btn svg{width:24px;height:24px}

/* ── MISC ── */
.avatar-img{border-radius:50%;object-fit:cover;background:#efefef}
.btn-text{background:none;border:none;color:var(--accent);font-weight:600;font-size:.875rem;cursor:pointer;padding:0}
.btn-text:disabled{color:#b2dffc;cursor:default}
.btn-icon{background:none;border:none;cursor:pointer;display:flex;align-items:center;padding:4px;color:var(--text)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{width:62px;height:62px;margin-bottom:16px;stroke-width:1}
.empty-state h3{font-size:1.25rem;font-weight:300;margin-bottom:8px;color:var(--text)}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted)}

@media(max-width:768px){
  .right-col{display:none}
  .app-layout{padding-top:var(--nav-h)}
  .feed-col{width:100%}
  .bottom-nav{display:flex}
  .topbar-search{display:none}
  body{padding-bottom:var(--bottom-h)}
}
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-box">
      <div class="auth-logo">Pulse</div>

      <div id="login-section">
        <input class="auth-input" id="li-user" placeholder="Username" autocomplete="username">
        <input class="auth-input" id="li-pass" placeholder="Password" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
        <button class="auth-btn" onclick="login()">Log in</button>
        <div class="auth-error" id="li-err"></div>
        <div class="auth-sep">OR</div>
        <p style="text-align:center;font-size:.8rem;color:var(--muted);margin-top:4px">Demo: <b>alice</b> / password123</p>
      </div>

      <div id="reg-section" style="display:none">
        <input class="auth-input" id="re-user" placeholder="Username">
        <input class="auth-input" id="re-email" placeholder="Email" type="email">
        <input class="auth-input" id="re-pass" placeholder="Password" type="password" onkeydown="if(event.key==='Enter')register()">
        <input class="auth-input" id="re-bio" placeholder="Bio (optional)">
        <button class="auth-btn" onclick="register()">Sign up</button>
        <div class="auth-error" id="re-err"></div>
      </div>
    </div>
    <div class="auth-switch">
      <span id="auth-switch-text">Don't have an account? <a onclick="switchAuth('register')">Sign up</a></span>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <nav class="topbar">
    <div class="topbar-inner">
      <div class="topbar-logo" onclick="showFeed()">Pulse</div>
      <div class="topbar-search">
        <input placeholder="Search" id="search-input" oninput="handleSearch(this.value)" onfocus="showSearchPage()" autocomplete="off">
      </div>
      <div class="topbar-icons">
        <button class="topbar-icon" onclick="showFeed()" title="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        </button>
        <button class="topbar-icon" onclick="openCreate()" title="Create">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
        <button class="topbar-icon" onclick="showExplore()" title="Explore">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="topbar-icon" onclick="showMyProfile()" title="Profile">
          <img id="topbar-avatar" class="avatar-img" width="24" height="24" src="" alt="">
        </button>
      </div>
    </div>
  </nav>

  <div id="page-feed" class="app-layout">
    <div class="feed-col">
      <div class="stories-row" id="stories-row"></div>
      <div id="feed-posts"></div>
    </div>
    <aside class="right-col">
      <div class="right-profile" id="right-profile"></div>
      <div class="suggestions-title"><span>Suggestions For You</span></div>
      <div id="suggestions-list"></div>
    </aside>
  </div>

  <div id="page-explore" style="display:none;max-width:935px;margin:54px auto 0;padding:24px 20px">
    <div id="search-results-wrap" style="display:none">
      <div id="search-results-list"></div>
    </div>
    <div id="explore-grid-wrap">
      <div class="explore-grid" id="explore-grid"></div>
    </div>
  </div>

  <div id="page-profile" style="display:none">
    <div id="profile-content"></div>
  </div>

  <nav class="bottom-nav">
    <button class="bottom-nav-btn" onclick="showFeed()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </button>
    <button class="bottom-nav-btn" onclick="showExplore()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="bottom-nav-btn" onclick="openCreate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </button>
    <button class="bottom-nav-btn" onclick="showMyProfile()">
      <img id="topbar-avatar2" class="avatar-img" width="24" height="24" src="" alt="">
    </button>
  </nav>
</div>

<!-- Comments Modal -->
<div class="modal-overlay" id="comments-modal">
  <div class="comments-modal">
    <div class="comments-post-preview" id="comments-preview"></div>
    <div class="comments-panel">
      <div class="comments-panel-header" id="comments-panel-header"></div>
      <div class="comments-list" id="comments-list"></div>
      <div style="padding:0 16px 8px;border-top:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;padding:8px 0">
          <button id="cm-like-btn" class="post-action-btn" onclick="toggleLikeFromModal()" style="padding:0">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          <span id="cm-likes" style="font-size:.875rem;font-weight:600"></span>
        </div>
      </div>
      <div class="comments-input-row">
        <img id="cm-user-avatar" class="avatar-img" width="32" height="32" src="" alt="">
        <input id="cm-input" placeholder="Add a comment…" oninput="document.getElementById('cm-post-btn').className='comments-post-btn'+(this.value.trim()?'  active':'')" onkeydown="if(event.key==='Enter')submitComment()">
        <button class="comments-post-btn" id="cm-post-btn" onclick="submitComment()">Post</button>
      </div>
    </div>
  </div>
</div>

<!-- Create Post Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="create-modal">
    <div class="create-modal-header">
      <button class="btn-icon" onclick="closeCreate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h3>Create new post</h3>
      <button class="btn-text" id="share-btn" onclick="createPost()">Share</button>
    </div>
    <div class="create-form">
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:4px">
        <img id="create-avatar" class="avatar-img" width="38" height="38" src="" alt="">
        <div style="flex:1">
          <div id="create-username" style="font-weight:600;font-size:.875rem;margin-bottom:8px"></div>
          <textarea id="create-content" placeholder="Write a caption…"></textarea>
        </div>
      </div>

      <div id="image-preview-box" class="preview-box" style="display:none">
        <img id="image-preview" src="" alt="">
        <button class="preview-remove" onclick="removeImage()">✕</button>
      </div>
      <div id="audio-preview-box" class="audio-preview" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span class="name" id="audio-preview-name"></span>
        <button onclick="removeAudio()">✕</button>
      </div>

      <div class="upload-row">
        <label class="upload-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Photo from device
          <input type="file" accept="image/*" id="image-file-input" onchange="handleImageSelect(event)">
        </label>
        <label class="upload-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          Add music
          <input type="file" accept="audio/*" id="audio-file-input" onchange="handleAudioSelect(event)">
        </label>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let me = null, token = null, activePostId = null, activePostData = null;
let selectedImageFile = null, selectedAudioFile = null;

// ── UTILS ──────────────────────────────────────────────────────
function timeAgo(iso) {
  const s = (Date.now() - new Date(iso)) / 1000;
  if (s < 60) return 'JUST NOW';
  if (s < 3600) return Math.floor(s/60) + (Math.floor(s/60)===1?' MINUTE':' MINUTES') + ' AGO';
  if (s < 86400) return Math.floor(s/3600) + (Math.floor(s/3600)===1?' HOUR':' HOURS') + ' AGO';
  if (s < 604800) return Math.floor(s/86400) + (Math.floor(s/86400)===1?' DAY':' DAYS') + ' AGO';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

async function api(path, opts={}) {
  const r = await fetch(API+'/api'+path, {
    ...opts,
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{}) }
  });
  return r.json();
}

async function apiUpload(formData) {
  const r = await fetch(API+'/api/upload', {
    method: 'POST',
    headers: { 'Authorization':`Bearer ${token}` },
    body: formData
  });
  return r.json();
}

// ── AUTH ──────────────────────────────────────────────────────
function switchAuth(mode) {
  const isLogin = mode === 'login';
  document.getElementById('login-section').style.display = isLogin ? 'block' : 'none';
  document.getElementById('reg-section').style.display = isLogin ? 'none' : 'block';
  document.getElementById('auth-switch-text').innerHTML = isLogin
    ? `Don't have an account? <a onclick="switchAuth('register')">Sign up</a>`
    : `Have an account? <a onclick="switchAuth('login')">Log in</a>`;
}

async function login() {
  const username = document.getElementById('li-user').value.trim();
  const password = document.getElementById('li-pass').value;
  document.getElementById('li-err').textContent = '';
  if (!username||!password) return document.getElementById('li-err').textContent='Fill in all fields';
  const d = await api('/auth/login',{method:'POST',body:JSON.stringify({username,password})});
  if (d.error) return document.getElementById('li-err').textContent = d.error;
  setSession(d.token, d.user);
}

async function register() {
  const username = document.getElementById('re-user').value.trim();
  const email = document.getElementById('re-email').value.trim();
  const password = document.getElementById('re-pass').value;
  const bio = document.getElementById('re-bio').value.trim();
  document.getElementById('re-err').textContent = '';
  if (!username||!email||!password) return document.getElementById('re-err').textContent='Fill in all fields';
  if (password.length<6) return document.getElementById('re-err').textContent='Password min 6 chars';
  const d = await api('/auth/register',{method:'POST',body:JSON.stringify({username,email,password,bio})});
  if (d.error) return document.getElementById('re-err').textContent = d.error;
  setSession(d.token, d.user);
}

function setSession(t, user) {
  token = t; me = user;
  localStorage.setItem('pulse_token', t);
  localStorage.setItem('pulse_user', JSON.stringify(user));
  bootApp();
}

function logout() {
  token=null; me=null;
  localStorage.removeItem('pulse_token');
  localStorage.removeItem('pulse_user');
  location.reload();
}

// ── BOOT ──────────────────────────────────────────────────────
function bootApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  ['topbar-avatar','topbar-avatar2'].forEach(id => {
    const el = document.getElementById(id);
    el.src = me.avatar;
    el.style.borderRadius = '50%';
  });
  document.getElementById('create-avatar').src = me.avatar;
  document.getElementById('create-username').textContent = me.username;
  showFeed();
  loadSuggestions();
  seedDemo();
}

// ── PAGES ──────────────────────────────────────────────────────
function showFeed() {
  hideAll();
  document.getElementById('page-feed').style.display = 'flex';
  loadStories();
  loadFeed();
}
function showExplore() {
  hideAll();
  document.getElementById('page-explore').style.display = 'block';
  document.getElementById('search-results-wrap').style.display = 'none';
  document.getElementById('explore-grid-wrap').style.display = 'block';
  loadExplore();
}
function showSearchPage() {
  hideAll();
  document.getElementById('page-explore').style.display = 'block';
}
function showMyProfile() { showProfile(me.username); }

async function showProfile(username) {
  hideAll();
  document.getElementById('page-profile').style.display = 'block';
  const el = document.getElementById('profile-content');
  el.innerHTML = '<div class="loader">Loading...</div>';
  const d = await api('/users/'+username);
  if (d.error) { el.innerHTML='<p style="text-align:center;padding:40px;color:var(--muted)">User not found</p>'; return; }
  const { user, posts, followers, following, isFollowing } = d;
  const isOwn = user.id === me.id;

  el.innerHTML = `
  <div class="profile-page">
    <div class="profile-top">
      <div class="profile-avatar-wrap" onclick="${isOwn?"document.getElementById('avatar-file-input').click()":''}">
        <img src="${user.avatar}" alt="" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=${user.username}'">
        ${isOwn?'<div class="overlay">Change photo</div><input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="handleAvatarChange(event)">':''}
      </div>
      <div class="profile-info-col">
        <div class="profile-username-row">
          <span class="profile-username">${esc(user.username)}</span>
          ${isOwn
            ? `<button class="profile-action-btn" onclick="editProfile()">Edit profile</button>
               <button class="profile-action-btn" onclick="logout()" style="color:var(--danger)">Log out</button>`
            : `<button class="profile-action-btn ${isFollowing?'following':''}" id="follow-btn" onclick="toggleFollow('${user.id}','${user.username}')">
                ${isFollowing?'Following':'Follow'}
               </button>`
          }
        </div>
        <div class="profile-stats">
          <div><span style="font-weight:600">${posts.length}</span> posts</div>
          <div><span style="font-weight:600" id="p-followers">${followers}</span> followers</div>
          <div><span style="font-weight:600">${following}</span> following</div>
        </div>
        <div class="profile-bio">${esc(user.bio||'')}</div>
      </div>
    </div>
    ${posts.length
      ? `<div class="profile-grid">${posts.map(p=>`
          <div class="profile-grid-item" onclick='openComments(${JSON.stringify(p._id)}, ${JSON.stringify(JSON.stringify(p))})'>
            ${p.image ? `<img src="${p.image}" alt="" onerror="this.style.display='none'">` : `<div style="background:#efefef;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:12px;font-size:.8rem;color:#999;text-align:center;overflow:hidden">${esc(p.content.slice(0,60))}</div>`}
            ${p.audio?`<div class="music-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`:''}
          </div>`).join('')}
        </div>`
      : `<div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <h3>No Posts Yet</h3>
        </div>`
    }
  </div>`;
}

function hideAll() {
  ['page-feed','page-explore','page-profile'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

// ── AVATAR UPLOAD ──────────────────────────────────────────────
async function handleAvatarChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('image', file);
  const res = await apiUpload(fd);
  if (res.error) return alert(res.error);
  await api('/users/me',{method:'PUT',body:JSON.stringify({bio:me.bio,avatar:res.imageUrl})});
  me.avatar = res.imageUrl;
  localStorage.setItem('pulse_user',JSON.stringify(me));
  bootApp();
  showMyProfile();
}

// ── STORIES ──────────────────────────────────────────────────
async function loadStories() {
  const users = await api('/users');
  const el = document.getElementById('stories-row');
  el.innerHTML = `
    <div class="story-item" onclick="openCreate()">
      <div class="story-ring add-btn" style="position:relative">
        <img class="story-avatar" src="${me.avatar}" alt="" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=${me.username}'">
        <div style="position:absolute;bottom:2px;right:2px;width:18px;height:18px;background:var(--accent);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;line-height:1">+</div>
      </div>
      <span class="story-name">Your story</span>
    </div>` 
    users.filter(u=>u.id!==me.id).slice(0,12).map(u=>`
    <div class="story-item" onclick="showProfile('${u.username}')">
      <div class="story-ring">
        <img class="story-avatar" src="${u.avatar}" alt="" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=${u.username}'">
      </div>
      <span class="story-name">${esc(u.username)}</span>
    </div>`).join('');
}

// ── FEED ──────────────────────────────────────────────────────
async function loadFeed() {
  const el = document.getElementById('feed-posts');
  el.innerHTML = '<div class="loader">Loading...</div>';
  const posts = await api('/posts/feed');
  if (!posts.length) {
    el.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <h3>Your feed is empty</h3>
      <p style="margin-top:8px;color:var(--muted);font-size:.875rem">Follow people to see their posts here</p>
    </div>`;
    return;
  }
  el.innerHTML = posts.map(renderPost).join('');
}

// ── POST CARD ──────────────────────────────────────────────────
function renderPost(p) {
  const isOwn = p.authorId === me.id;
  const dataAttr = esc(JSON.stringify(p));
  return `
  <div class="post-card" id="post-${p._id}">
    <div class="post-header">
      <img class="avatar avatar-img" width="32" height="32" src="${p.author?.avatar||''}" alt="" onclick="showProfile('${p.author?.username}')" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=x'">
      <span class="post-username" onclick="showProfile('${p.author?.username}')">${esc(p.author?.username)}</span>
      ${p.audio?`<span class="post-music-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> Audio</span>`:''}
      ${isOwn?`<button class="post-more" onclick="deletePost('${p._id}')" title="Delete">···</button>`:''}
    </div>
    ${p.image?`<img class="post-image" src="${p.image}" alt="" onerror="this.style.display='none'" onclick='openComments(${JSON.stringify(p._id)}, ${JSON.stringify(JSON.stringify(p))})'>`:
    (p.content?`<div style="padding:0 16px 12px;font-size:.9rem;line-height:1.6;white-space:pre-wrap;cursor:pointer" onclick='openComments(${JSON.stringify(p._id)}, ${JSON.stringify(JSON.stringify(p))})'>${esc(p.content)}</div>`:'')}
    <div class="post-actions">
      <button class="post-action-btn" id="lb-${p._id}" onclick="toggleLike('${p._id}',this)">
        <svg viewBox="0 0 24 24" fill="${p.liked?'#ed4956':'none'}" stroke="${p.liked?'#ed4956':'currentColor'}" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="post-action-btn" onclick='openComments(${JSON.stringify(p._id)}, ${JSON.stringify(JSON.stringify(p))})'>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </button>
      <button class="post-action-btn post-save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="19 21 12 16 5 21 5 3 19 3 19 21"/></svg>
      </button>
    </div>
    <div class="post-likes" id="likes-${p._id}">${p.likesCount} ${p.likesCount===1?'like':'likes'}</div>
    ${p.image && p.content?`<div class="post-caption"><span class="username" onclick="showProfile('${p.author?.username}')">${esc(p.author?.username)}</span>${esc(p.content)}</div>`:''}
    <div class="post-view-comments" onclick='openComments(${JSON.stringify(p._id)}, ${JSON.stringify(JSON.stringify(p))})'>${p.commentsCount>0?`View all ${p.commentsCount} comments`:''}</div>
    <div class="post-time">${timeAgo(p.createdAt)}</div>
    <div class="post-comment-row">
      <img class="avatar-img" width="24" height="24" src="${me.avatar}" alt="" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=x'">
      <input placeholder="Add a comment…" id="ci-${p._id}" oninput="document.getElementById('cp-${p._id}').classList.toggle('active',!!this.value.trim())" onkeydown="if(event.key==='Enter')quickComment('${p._id}')">
      <button class="post-comment-post" id="cp-${p._id}" onclick="quickComment('${p._id}')">Post</button>
    </div>
  </div>`;
}

// ── LIKES ──────────────────────────────────────────────────────
async function toggleLike(postId, btn) {
  const d = await api('/posts/'+postId+'/like',{method:'POST'});
  const svg = btn.querySelector('svg');
  if (d.liked) { svg.setAttribute('fill','#ed4956'); svg.setAttribute('stroke','#ed4956'); }
  else { svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor'); }
  const el = document.getElementById('likes-'+postId);
  if (el) el.textContent = d.count + (d.count===1?' like':' likes');
  if (activePostId === postId) {
    activePostData = { ...activePostData, liked: d.liked, likesCount: d.count };
    updateModalLike(d.liked, d.count);
  }
}

async function toggleLikeFromModal() {
  if (!activePostId) return;
  const btn = document.getElementById('lb-'+activePostId);
  if (btn) btn.click();
}

function updateModalLike(liked, count) {
  const btn = document.getElementById('cm-like-btn');
  const svg = btn?.querySelector('svg');
  if (svg) { svg.setAttribute('fill', liked?'#ed4956':'none'); svg.setAttribute('stroke', liked?'#ed4956':'currentColor'); }
  document.getElementById('cm-likes').textContent = count + (count===1?' like':' likes');
}

// ── QUICK COMMENT ──────────────────────────────────────────────
async function quickComment(postId) {
  const input = document.getElementById('ci-'+postId);
  const content = input?.value.trim();
  if (!content) return;
  await api('/posts/'+postId+'/comments',{method:'POST',body:JSON.stringify({content})});
  input.value = '';
  document.getElementById('cp-'+postId)?.classList.remove('active');
  const vcEl = document.querySelector(`#post-${postId} .post-view-comments`);
  if (vcEl) {
    const cur = parseInt(vcEl.textContent)||0;
    vcEl.textContent = `View all ${cur+1} comments`;
  }
}

// ── COMMENTS MODAL ──────────────────────────────────────────────
async function openComments(postId, postDataStr) {
  activePostId = postId;
  let postData;
  try { postData = JSON.parse(postDataStr); } catch { postData = null; }
  activePostData = postData;

  document.getElementById('comments-modal').classList.add('open');
  document.getElementById('cm-user-avatar').src = me.avatar;
  document.getElementById('cm-input').value = '';
  document.getElementById('cm-post-btn').className = 'comments-post-btn';

  const preview = document.getElementById('comments-preview');
  let previewHtml = '';
  if (postData?.image) previewHtml += `<img src="${postData.image}" alt="" onerror="this.parentNode.querySelector('img')?.remove()">`;
  else previewHtml += `<div class="no-img">${esc(postData?.content||'')}</div>`;
  if (postData?.audio) previewHtml += `<div class="audio-player-bar"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="18" height="18"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><audio controls src="${postData.audio}"></audio></div>`;
  preview.innerHTML = previewHtml;

  const header = document.getElementById('comments-panel-header');
  if (postData) {
    header.innerHTML = `
      <img class="avatar-img" width="32" height="32" src="${postData.author?.avatar||''}" alt="" onclick="showProfile('${postData.author?.username}');closeComments()" style="cursor:pointer" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=x'">
      <span style="font-weight:600;font-size:.875rem;cursor:pointer" onclick="showProfile('${postData.author?.username}');closeComments()">${esc(postData.author?.username)}</span>`;
  }

  updateModalLike(postData?.liked, postData?.likesCount||0);
  await loadModalComments(postId);
}

function closeComments() {
  document.getElementById('comments-modal').classList.remove('open');
  activePostId = null; activePostData = null;
}

async function loadModalComments(postId) {
  const el = document.getElementById('comments-list');
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:.875rem">Loading...</div>';
  const comments = await api('/posts/'+postId+'/comments');
  if (!comments.length) {
    el.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:.875rem">No comments yet.<br>Start the conversation.</div>';
    return;
  }
  el.innerHTML = comments.map(c=>`
    <div class="comment-item" id="cm-${c._id}">
      <img class="avatar avatar-img" width="32" height="32" src="${c.author?.avatar||''}" alt="" onclick="showProfile('${c.author?.username}');closeComments()" style="cursor:pointer" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=x'">
      <div class="comment-body">
        <span class="username" onclick="showProfile('${c.author?.username}');closeComments()">${esc(c.author?.username)}</span><span class="text">${esc(c.content)}</span>
        <div style="display:flex;gap:12px;align-items:center;margin-top:4px">
          <span class="time">${timeAgo(c.createdAt)}</span>
          ${c.authorId===me.id?`<span style="font-size:.72rem;color:var(--muted);cursor:pointer" onclick="deleteComment('${c._id}')">Delete</span>`:''}
        </div>
      </div>
    </div>`).join('');
}

async function submitComment() {
  if (!activePostId) return;
  const input = document.getElementById('cm-input');
  const content = input.value.trim();
  if (!content) return;
  await api('/posts/'+activePostId+'/comments',{method:'POST',body:JSON.stringify({content})});
  input.value = '';
  document.getElementById('cm-post-btn').className = 'comments-post-btn';
  loadModalComments(activePostId);
}

async function deleteComment(id) {
  await api('/comments/'+id,{method:'DELETE'});
  document.getElementById('cm-'+id)?.remove();
}

// ── CREATE POST ──────────────────────────────────────────────
function openCreate() { document.getElementById('create-modal').classList.add('open'); }
function closeCreate() {
  document.getElementById('create-modal').classList.remove('open');
  document.getElementById('create-content').value = '';
  removeImage();
  removeAudio();
}

function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedImageFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('image-preview').src = ev.target.result;
    document.getElementById('image-preview-box').style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function removeImage() {
  selectedImageFile = null;
  document.getElementById('image-preview-box').style.display = 'none';
  document.getElementById('image-preview').src = '';
  document.getElementById('image-file-input').value = '';
}

function handleAudioSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedAudioFile = file;
  document.getElementById('audio-preview-name').textContent = file.name;
  document.getElementById('audio-preview-box').style.display = 'flex';
}
function removeAudio() {
  selectedAudioFile = null;
  document.getElementById('audio-preview-box').style.display = 'none';
  document.getElementById('audio-file-input').value = '';
}

async function createPost() {
  const content = document.getElementById('create-content').value.trim();
  if (!content && !selectedImageFile) return alert('Add a caption or photo');

  const shareBtn = document.getElementById('share-btn');
  shareBtn.disabled = true;
  shareBtn.textContent = 'Sharing...';

  let image = null, audio = null;
  if (selectedImageFile || selectedAudioFile) {
    const fd = new FormData();
    if (selectedImageFile) fd.append('image', selectedImageFile);
    if (selectedAudioFile) fd.append('audio', selectedAudioFile);
    const res = await apiUpload(fd);
    if (res.error) { shareBtn.disabled=false; shareBtn.textContent='Share'; return alert(res.error); }
    image = res.imageUrl || null;
    audio = res.audioUrl || null;
  }

  const p = await api('/posts',{method:'POST',body:JSON.stringify({content,image,audio})});
  shareBtn.disabled = false;
  shareBtn.textContent = 'Share';
  if (p.error) return alert(p.error);
  closeCreate();
  showFeed();
}

// ── DELETE POST ──────────────────────────────────────────────
async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  await api('/posts/'+id,{method:'DELETE'});
  document.getElementById('post-'+id)?.remove();
}

// ── FOLLOW ──────────────────────────────────────────────────
async function toggleFollow(userId, username) {
  const d = await api('/follow/'+userId,{method:'POST'});
  const btn = document.getElementById('follow-btn');
  if (!btn) return;
  if (d.followed) { btn.textContent='Following'; btn.classList.add('following'); }
  else { btn.textContent='Follow'; btn.classList.remove('following'); }
  const fc = document.getElementById('p-followers');
  if (fc) fc.textContent = parseInt(fc.textContent)+(d.followed?1:-1);
  loadSuggestions();
}

// ── EXPLORE ──────────────────────────────────────────────────
async function loadExplore() {
  const el = document.getElementById('explore-grid');
  el.innerHTML = '<div class="loader" style="grid-column:1/-1">Loading...</div>';
  const posts = await api('/posts');
  if (!posts.length) { el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)">No posts yet</div>'; return; }
  el.innerHTML = posts.map(p => p.image
    ? `<div class="explore-item" onclick='openComments(${JSON.stringify(p._id)}, ${JSON.stringify(JSON.stringify(p))})'><img src="${p.image}" alt="" onerror="this.parentNode.style.display='none'">${p.audio?`<div class="music-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`:''}</div>`
    : `<div class="explore-text-item" onclick='openComments(${JSON.stringify(p._id)}, ${JSON.stringify(JSON.stringify(p))})'><div class="e-username">${esc(p.author?.username)}</div><div class="e-content">${esc(p.content)}</div></div>`
  ).join('');
}

// ── SEARCH ──────────────────────────────────────────────────
let searchTimer;
async function handleSearch(q) {
  clearTimeout(searchTimer);
  const rWrap = document.getElementById('search-results-wrap');
  const gWrap = document.getElementById('explore-grid-wrap');
  if (!q) { rWrap.style.display='none'; gWrap.style.display='block'; return; }
  searchTimer = setTimeout(async () => {
    rWrap.style.display = 'block';
    gWrap.style.display = 'none';
    const users = await api('/users?q='+encodeURIComponent(q));
    document.getElementById('search-results-list').innerHTML = users.length
      ? users.map(u=>`
        <div class="search-result-item" onclick="showProfile('${u.username}')">
          <img class="avatar avatar-img" width="44" height="44" src="${u.avatar}" alt="" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=x'">
          <div class="info">
            <div class="name">${esc(u.username)}</div>
            <div class="bio">${esc(u.bio||'No bio')}</div>
          </div>
        </div>`).join('')
      : '<p style="text-align:center;padding:40px;color:var(--muted);font-size:.875rem">No users found</p>';
  }, 300);
}

// ── SUGGESTIONS ──────────────────────────────────────────────
async function loadSuggestions() {
  const rpEl = document.getElementById('right-profile');
  rpEl.innerHTML = `
    <img class="avatar avatar-img" width="56" height="56" src="${me.avatar}" alt="" onclick="showMyProfile()" style="cursor:pointer" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=x'">
    <div class="info">
      <div class="name" onclick="showMyProfile()" style="cursor:pointer">${esc(me.username)}</div>
      <div class="fullname">${esc(me.bio||'')}</div>
    </div>
    <button class="switch-btn" onclick="logout()">Log out</button>`;

  const users = await api('/users');
  const el = document.getElementById('suggestions-list');
  const others = users.filter(u=>u.id!==me.id).slice(0,5);
  el.innerHTML = others.map(u=>`
    <div class="suggest-item">
      <img class="avatar avatar-img" width="32" height="32" src="${u.avatar}" alt="" onclick="showProfile('${u.username}')" style="cursor:pointer" onerror="this.src='https://api.dicebear.com/7.x/personas/svg?seed=x'">
      <div class="info">
        <span class="name" onclick="showProfile('${u.username}')">${esc(u.username)}</span>
        <span class="sub">Suggested for you</span>
      </div>
      <button class="suggest-follow" onclick="quickFollow('${u.id}','${u.username}',this)">Follow</button>
    </div>`).join('');
}

async function quickFollow(userId, username, btn) {
  const d = await api('/follow/'+userId,{method:'POST'});
  btn.textContent = d.followed ? 'Following' : 'Follow';
  btn.style.color = d.followed ? 'var(--muted)' : 'var(--accent)';
}

// ── EDIT PROFILE ──────────────────────────────────────────────
function editProfile() {
  const bio = prompt('Update bio:', me.bio||'');
  if (bio===null) return;
  api('/users/me',{method:'PUT',body:JSON.stringify({bio,avatar:me.avatar})}).then(()=>{
    me.bio = bio;
    localStorage.setItem('pulse_user',JSON.stringify(me));
    showMyProfile();
  });
}

// ── SEED DEMO ──────────────────────────────────────────────
async function seedDemo() {
  const demoUsers = [
    {username:'alice',email:'alice@pulse.app',password:'password123',bio:'Designer & coffee enthusiast'},
    {username:'bob',email:'bob@pulse.app',password:'password123',bio:'Full-stack dev'},
    {username:'carol',email:'carol@pulse.app',password:'password123',bio:'Photographer | Travel lover'},
  ];
  for (const u of demoUsers) {
    await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(u)}).catch(()=>{});
  }
}

// ── CLOSE MODALS ON BG CLICK ──────────────────────────────────
document.getElementById('comments-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeComments(); });
document.getElementById('create-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeCreate(); });

// ── INIT ──────────────────────────────────────────────────────
(()=>{
  const t = localStorage.getItem('pulse_token');
  const u = localStorage.getItem('pulse_user');
  if (t&&u) { token=t; me=JSON.parse(u); bootApp(); }
})();
</script>
